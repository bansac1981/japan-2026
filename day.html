<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... | Japan 2026</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Mobile-first day page */
    .day-activities { margin-top: 16px; }

    .act-card {
      background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 10px; box-shadow: var(--shadow); position: relative;
      border-left: 4px solid var(--border);
    }
    .act-card.tokyo { border-left-color: var(--tokyo); }
    .act-card.kyoto { border-left-color: var(--kyoto); }
    .act-card.osaka { border-left-color: var(--osaka); }
    .act-card.transit { border-left-color: var(--transit); }

    .act-time { font-size: 0.75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    .act-name { font-weight: 700; font-size: 1rem; margin: 3px 0; }
    .act-cost { display: inline-block; background: #F0F9F0; color: #2D7A4F; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-weight: 700; }
    .act-notes { font-size: 0.84rem; color: #4A4540; margin-top: 6px; line-height: 1.55; display: none; }
    .act-card.expanded .act-notes { display: block; }
    .act-ticket { font-size: 0.75rem; color: var(--transit); margin-top: 4px; display: none; }
    .act-card.expanded .act-ticket { display: block; }
    .act-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; display: none; }
    .act-card.expanded .act-actions { display: flex; }

    .act-expand-hint { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
    .act-card.expanded .act-expand-hint { display: none; }

    /* Edit/delete buttons on expanded card */
    .act-edit-btns { display: none; position: absolute; top: 12px; right: 12px; gap: 6px; }
    .act-card.expanded .act-edit-btns { display: flex; }
    .act-edit-btns button {
      background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px;
      padding: 4px 8px; font-size: 0.78rem; cursor: pointer; font-family: inherit;
    }
    .act-edit-btns .btn-del:active { background: #FEE2E2; border-color: #FCA5A5; }

    /* Food/shopping/hacks sections */
    .day-section { margin-top: 20px; }
    .day-section-title {
      font-size: 0.85rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
      padding-bottom: 6px; border-bottom: 1.5px solid var(--border);
    }
    .food-item, .shop-item, .hack-item-simple {
      background: var(--card-bg); border-radius: 10px; padding: 10px 14px;
      margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      font-size: 0.85rem; line-height: 1.5;
    }
    .food-item strong, .shop-item strong { display: block; font-size: 0.88rem; }
    .food-item .meta, .shop-item .meta { color: var(--muted); font-size: 0.78rem; }
    .hack-item-simple { background: #FFFBF0; border: 1px solid var(--kyoto-mid); }

    /* Floating Add Button */
    .fab {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 1.8rem; font-weight: 300; line-height: 56px; text-align: center;
      box-shadow: 0 4px 16px rgba(200,71,42,0.4); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fab:active { transform: scale(0.92); }

    /* Bottom sheet modal for add/edit */
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 300; display: none;
    }
    .sheet-backdrop.open { display: block; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 301;
      background: var(--card-bg); border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px; max-height: 85vh; overflow-y: auto;
      transform: translateY(100%); transition: transform 0.25s ease-out;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    }
    .sheet-backdrop.open .sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .sheet h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; }
    .sheet .form-row { margin-bottom: 12px; }
    .sheet .form-row label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
    .sheet .form-row input, .sheet .form-row textarea {
      width: 100%; padding: 10px 12px; border: 2px solid var(--border);
      border-radius: 8px; font-size: 0.92rem; font-family: inherit;
    }
    .sheet .form-row input:focus, .sheet .form-row textarea:focus {
      outline: none; border-color: var(--accent);
    }
    .sheet .form-row textarea { min-height: 60px; resize: vertical; }
    .sheet-actions { display: flex; gap: 10px; margin-top: 16px; }
    .sheet-actions button {
      flex: 1; padding: 12px; border-radius: 8px; font-size: 0.92rem;
      font-weight: 700; cursor: pointer; border: none; font-family: inherit;
    }
    .btn-save { background: var(--accent); color: #fff; }
    .btn-save:active { background: #B53B22; }
    .btn-cancel { background: var(--bg); color: var(--text); border: 1.5px solid var(--border) !important; }

    /* Status toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; z-index: 400;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Day nav simplified */
    .day-nav-simple { display: flex; justify-content: space-between; gap: 8px; margin-top: 24px; padding-bottom: 80px; }
    .day-nav-simple a {
      flex: 1; text-align: center; padding: 12px 8px;
      background: var(--card-bg); border-radius: 10px; text-decoration: none;
      color: var(--text); font-weight: 600; font-size: 0.82rem;
      box-shadow: var(--shadow); border: 1.5px solid var(--border);
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>Japan 2026</h1>
  <p>18 May - 8 Jun</p>
</header>

<nav class="site-nav">
  <a href="index.html">Calendar</a>
  <a href="search.html">Search</a>
  <a href="phrases.html">Phrases</a>
</nav>

<div class="container" id="day-content">
  <p style="text-align:center;padding:60px;color:#999">Loading...</p>
</div>

<!-- Floating Add Button -->
<button class="fab" id="fab-add" onclick="openAddSheet()" title="Add activity">+</button>

<!-- Bottom sheet for Add/Edit -->
<div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3 id="sheet-title">Add Activity</h3>
    <div class="form-row">
      <label for="f-name">Activity name *</label>
      <input type="text" id="f-name" placeholder="e.g. Ramen lunch at Ichiran">
    </div>
    <div class="form-row">
      <label for="f-time">Time (optional)</label>
      <input type="text" id="f-time" placeholder="e.g. 12:30 or Morning">
    </div>
    <div class="form-row">
      <label for="f-cost">Cost (optional)</label>
      <input type="text" id="f-cost" placeholder="e.g. ~1500 or Free">
    </div>
    <div class="form-row">
      <label for="f-location">Location / place name (optional)</label>
      <input type="text" id="f-location" placeholder="e.g. Ichiran Shibuya Tokyo">
    </div>
    <div class="form-row">
      <label for="f-notes">Notes (optional)</label>
      <textarea id="f-notes" placeholder="Any details..."></textarea>
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn-save" id="btn-sheet-save" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<footer class="site-footer">Japan 2026 - Bansal-Jain Family</footer>

<script src="data.js"></script>
<script src="github-edit.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var dateStr = params.get('date');
  var day = dateStr ? getDayByDate(dateStr) : null;
  var el = document.getElementById('day-content');

  if (!day) {
    document.title = 'Day not found | Japan 2026';
    el.innerHTML = '<div style="text-align:center;padding:60px">' +
      '<h2>Day not found</h2>' +
      '<a href="index.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Back to Calendar</a>' +
      '</div>';
    document.getElementById('fab-add').style.display = 'none';
    return;
  }

  var colors = REGION_COLORS[day.region] || REGION_COLORS.transit;
  document.title = 'Day ' + day.day + ': ' + day.theme + ' | Japan 2026';

  // Navigation
  var allDates = TRIP_DATA.days.map(function(d){return d.date;}).sort();
  var idx = allDates.indexOf(day.date);
  var prevDate = idx > 0 ? allDates[idx-1] : null;
  var nextDate = idx < allDates.length-1 ? allDates[idx+1] : null;

  var niceDateStr = new Date(day.date+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

  // Build activities HTML
  function buildActivities(activities, startLoc) {
    if (!activities || activities.length === 0) return '<p style="color:var(--muted);padding:12px">No activities planned yet.</p>';
    var html = '';
    activities.forEach(function(act, i) {
      var prevLoc = i > 0 ? (activities[i-1].location || startLoc) : startLoc;
      var mapHref = act.location ? mapsLink(prevLoc, act.location) : null;

      html += '<div class="act-card ' + day.region + '" data-idx="' + i + '" onclick="toggleCard(this)">' +
        '<div class="act-edit-btns">' +
          '<button onclick="event.stopPropagation();editItem('+i+')">Edit</button>' +
          '<button class="btn-del" onclick="event.stopPropagation();deleteItem('+i+')">Del</button>' +
        '</div>' +
        (act.time ? '<div class="act-time">' + esc(act.time) + '</div>' : '') +
        '<div class="act-name">' + esc(act.name) + '</div>' +
        (act.cost ? '<span class="act-cost">' + esc(act.cost) + '</span>' : '') +
        '<div class="act-expand-hint">Tap for details</div>' +
        '<div class="act-notes">' + esc(act.notes || '') + '</div>' +
        (act.ticket ? '<div class="act-ticket">' + esc(act.ticket) + '</div>' : '') +
        '<div class="act-actions">' +
          (mapHref ? '<a href="'+mapHref+'" target="_blank" class="btn-maps" onclick="event.stopPropagation()">Directions</a>' : '') +
        '</div>' +
      '</div>';
    });
    return html;
  }

  // Build food section
  function buildFood(food) {
    if (!food || food.length === 0) return '';
    var html = '<div class="day-section"><div class="day-section-title">What to Eat</div>';
    food.forEach(function(f) {
      html += '<div class="food-item"><strong>' + esc(f.name) + '</strong>' +
        '<div class="meta">' + esc(f.where) + ' - ' + esc(f.price) + '</div>' +
        (f.notes ? '<div>' + esc(f.notes) + '</div>' : '') + '</div>';
    });
    return html + '</div>';
  }

  // Build shopping section
  function buildShopping(shopping) {
    if (!shopping || shopping.length === 0) return '';
    var html = '<div class="day-section"><div class="day-section-title">Shopping</div>';
    shopping.forEach(function(s) {
      html += '<div class="shop-item"><strong>' + esc(s.name) + '</strong>' +
        '<div class="meta">' + esc(s.where) + ' - ' + esc(s.price) + '</div>' +
        (s.notes ? '<div>' + esc(s.notes) + '</div>' : '') + '</div>';
    });
    return html + '</div>';
  }

  // Build hacks section
  function buildHacks(hacks) {
    if (!hacks || hacks.length === 0) return '';
    var html = '<div class="day-section"><div class="day-section-title">Tips & Hacks</div>';
    hacks.forEach(function(h) {
      html += '<div class="hack-item-simple">' + esc(h) + '</div>';
    });
    return html + '</div>';
  }

  var startLoc = day.startLocation || 'Aoto Station Katsushika Tokyo';

  el.innerHTML =
    '<div class="day-header ' + day.region + '">' +
      '<div class="day-header-top">' +
        '<div class="day-num">' + esc(colors.label) + ' Day ' + day.day + '</div>' +
      '</div>' +
      '<h1>' + esc(day.theme) + '</h1>' +
      '<div class="day-meta">' + niceDateStr + ' - ' + esc(day.city) + '</div>' +
    '</div>' +
    '<div class="day-activities">' + buildActivities(day.activities, startLoc) + '</div>' +
    buildFood(day.food) +
    buildShopping(day.shopping) +
    buildHacks(day.hacks) +
    '<div class="day-nav-simple">' +
      (prevDate ? '<a href="day.html?date='+prevDate+'">Prev</a>' : '<span></span>') +
      '<a href="index.html">Calendar</a>' +
      (nextDate ? '<a href="day.html?date='+nextDate+'">Next</a>' : '<span></span>') +
    '</div>';

  // ── Card expand/collapse ──
  window.toggleCard = function(card) {
    card.classList.toggle('expanded');
  };

  // ── Sheet state ──
  var _editIdx = -1; // -1 = adding new, >= 0 = editing existing

  window.openAddSheet = function() {
    _editIdx = -1;
    document.getElementById('sheet-title').textContent = 'Add Activity';
    document.getElementById('f-name').value = '';
    document.getElementById('f-time').value = '';
    document.getElementById('f-cost').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('sheet-backdrop').classList.add('open');
  };

  window.editItem = function(idx) {
    _editIdx = idx;
    var act = day.activities[idx];
    document.getElementById('sheet-title').textContent = 'Edit Activity';
    document.getElementById('f-name').value = act.name || '';
    document.getElementById('f-time').value = act.time || '';
    document.getElementById('f-cost').value = act.cost || '';
    document.getElementById('f-location').value = act.location || '';
    document.getElementById('f-notes').value = act.notes || '';
    document.getElementById('sheet-backdrop').classList.add('open');
  };

  window.closeSheet = function() {
    document.getElementById('sheet-backdrop').classList.remove('open');
  };

  window.deleteItem = function(idx) {
    var act = day.activities[idx];
    if (!confirm('Delete "' + act.name + '"?')) return;
    day.activities.splice(idx, 1);
    // Re-render
    document.querySelector('.day-activities').innerHTML = buildActivities(day.activities, startLoc);
    showToast('Deleted! Saving...');
    commitToGitHub('Remove: ' + act.name + ' from ' + day.date);
  };

  window.saveItem = function() {
    var name = document.getElementById('f-name').value.trim();
    if (!name) { alert('Activity name is required'); return; }

    var item = {
      name: name,
      time: document.getElementById('f-time').value.trim() || '',
      cost: document.getElementById('f-cost').value.trim() || '',
      location: document.getElementById('f-location').value.trim() || '',
      notes: document.getElementById('f-notes').value.trim() || ''
    };

    if (_editIdx >= 0) {
      // Update existing — preserve any fields we don't show in the form
      var existing = day.activities[_editIdx];
      existing.name = item.name;
      existing.time = item.time;
      existing.cost = item.cost;
      existing.location = item.location;
      existing.notes = item.notes;
    } else {
      // Add new — insert at logical position based on time
      var insertIdx = findInsertPosition(day.activities, item.time);
      day.activities.splice(insertIdx, 0, item);
    }

    closeSheet();
    // Re-render
    document.querySelector('.day-activities').innerHTML = buildActivities(day.activities, startLoc);
    showToast('Saved! Pushing to site...');
    commitToGitHub((_editIdx >= 0 ? 'Edit' : 'Add') + ': ' + item.name + ' on ' + day.date);
  };

  // Find insert position by time
  function findInsertPosition(activities, timeStr) {
    if (!timeStr) return activities.length; // no time → add at end
    var newH = parseTimeToHour(timeStr);
    if (newH === null) return activities.length;
    for (var i = 0; i < activities.length; i++) {
      var h = parseTimeToHour(activities[i].time);
      if (h !== null && h > newH) return i;
    }
    return activities.length;
  }

  function parseTimeToHour(t) {
    if (!t) return null;
    var m = t.match(/(\d{1,2}):(\d{2})/);
    if (m) return parseInt(m[1]) + parseInt(m[2])/60;
    var m2 = t.match(/^(\d{1,2})/);
    if (m2 && parseInt(m2[1]) >= 5 && parseInt(m2[1]) <= 23) return parseInt(m2[1]);
    if (/morning/i.test(t)) return 9;
    if (/afternoon/i.test(t)) return 14;
    if (/evening/i.test(t)) return 18;
    return null;
  }

})();

// ── Helpers ──
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
